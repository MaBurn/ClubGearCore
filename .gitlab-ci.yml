stages:
  - build
  - test
  - image

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet --info
    - dotnet restore
    - dotnet build -c Release --no-restore /warnaserror

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet test tests/ClubGear.ArchitectureTests/ClubGear.ArchitectureTests.csproj -c Release --no-build

image:
  stage: image
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t clubgear:$CI_COMMIT_SHA .
  only:
    - branches
